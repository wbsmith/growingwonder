version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - mkdir -p .amplify-hosting/static
        - cp -r public/* .amplify-hosting/static/
        - mkdir -p .amplify-hosting/compute/default
        - cp -r views .amplify-hosting/compute/default/
        - cp -r lib .amplify-hosting/compute/default/
        - cp -r routes .amplify-hosting/compute/default/
        - cp -r db .amplify-hosting/compute/default/
        - cp app.js server.js package.json package-lock.json .amplify-hosting/compute/default/
        - cp deploy-manifest.json .amplify-hosting/deploy-manifest.json
        - echo "SESSION_SECRET=$SESSION_SECRET" > .amplify-hosting/compute/default/.env
        - echo "ADMIN_USER=$ADMIN_USER" >> .amplify-hosting/compute/default/.env
        - echo "ADMIN_PASS=$ADMIN_PASS" >> .amplify-hosting/compute/default/.env
        - echo "SES_FROM_EMAIL_REG=$SES_FROM_EMAIL_REG" >> .amplify-hosting/compute/default/.env
        - echo "SES_FROM_EMAIL_INFO=$SES_FROM_EMAIL_INFO" >> .amplify-hosting/compute/default/.env
        - echo "WIW_ACCESS_KEY_ID=$WIW_ACCESS_KEY_ID" >> .amplify-hosting/compute/default/.env
        - echo "WIW_SECRET_ACCESS_KEY=$WIW_SECRET_ACCESS_KEY" >> .amplify-hosting/compute/default/.env
        - cd .amplify-hosting/compute/default && npm ci --omit=dev
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - '**/*'
