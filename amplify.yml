version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - mkdir -p .amplify-hosting/static
        - cp -r public/* .amplify-hosting/static/
        - mkdir -p .amplify-hosting/compute/default
        - cp -r views .amplify-hosting/compute/default/
        - cp -r lib .amplify-hosting/compute/default/
        - cp -r routes .amplify-hosting/compute/default/
        - cp -r db .amplify-hosting/compute/default/
        - cp app.js lambda.js package.json package-lock.json .amplify-hosting/compute/default/
        - cp deploy-manifest.json .amplify-hosting/deploy-manifest.json
        - cd .amplify-hosting/compute/default && npm ci --omit=dev
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - '**/*'
